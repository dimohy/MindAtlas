<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#7B1FA2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5"/>
      <stop offset="100%" style="stop-color:#CE93D8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Connection lines (mind map edges) -->
  <g stroke="url(#glow)" stroke-width="6" stroke-opacity="0.5" fill="none">
    <!-- Center to satellites -->
    <line x1="256" y1="256" x2="160" y2="140"/>
    <line x1="256" y1="256" x2="352" y2="140"/>
    <line x1="256" y1="256" x2="130" y2="280"/>
    <line x1="256" y1="256" x2="382" y2="280"/>
    <line x1="256" y1="256" x2="180" y2="390"/>
    <line x1="256" y1="256" x2="332" y2="390"/>
    <!-- Cross connections -->
    <line x1="160" y1="140" x2="352" y2="140"/>
    <line x1="130" y1="280" x2="180" y2="390"/>
    <line x1="382" y1="280" x2="332" y2="390"/>
    <line x1="160" y1="140" x2="130" y2="280"/>
    <line x1="352" y1="140" x2="382" y2="280"/>
    <line x1="180" y1="390" x2="332" y2="390"/>
  </g>

  <!-- Satellite nodes -->
  <g fill="white" fill-opacity="0.9">
    <circle cx="160" cy="140" r="22"/>
    <circle cx="352" cy="140" r="22"/>
    <circle cx="130" cy="280" r="20"/>
    <circle cx="382" cy="280" r="20"/>
    <circle cx="180" cy="390" r="18"/>
    <circle cx="332" cy="390" r="18"/>
  </g>

  <!-- Central node (larger, brighter) -->
  <circle cx="256" cy="256" r="40" fill="white"/>
  <circle cx="256" cy="256" r="28" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="16" fill="white"/>
</svg>
